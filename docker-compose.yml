services:
  hugbucket:
    image: ghcr.io/exynos967/hugbucket:latest
    container_name: hugbucket
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 gateway + Admin panel (same port)
    environment:
      - ADMIN_PASSWORD=changeme
      - AWS_ACCESS_KEY_ID=hugbucket
      - AWS_SECRET_ACCESS_KEY=hugbucket
      - HUGBUCKET_TOKENS_FILE=/data/tokens.json
    volumes:
      - hugbucket_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hugbucket_data:
    driver: local
