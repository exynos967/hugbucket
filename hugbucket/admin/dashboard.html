<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HugBucket</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3' },
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #334155; margin: 0; -webkit-font-smoothing: antialiased; }

  /* ── Cards ── */
  .card { background: #fff; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 16px rgba(148,163,184,.12); }
  .card-stat { transition: all .25s; cursor: default; }
  .card-stat:hover { box-shadow: 0 8px 30px rgba(99,102,241,.10); border-color: #c7d2fe; transform: translateY(-2px); }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 14px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: #6366f1; color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,.28); }
  .btn-primary:hover { background: #4f46e5; box-shadow: 0 6px 20px rgba(99,102,241,.35); }
  .btn-outline { background: #fff; color: #475569; border: 1.5px solid #e2e8f0; }
  .btn-outline:hover { background: #f8fafc; border-color: #cbd5e1; }
  .btn-ghost { background: transparent; color: #64748b; padding: 8px 12px; }
  .btn-ghost:hover { background: #f1f5f9; color: #334155; }
  .btn-danger-ghost { background: transparent; color: #f43f5e; padding: 8px 12px; }
  .btn-danger-ghost:hover { background: #fff1f2; }

  /* ── Input groups ── */
  .input-group { display: flex; align-items: stretch; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 16px; overflow: hidden; transition: all .2s; }
  .input-group:focus-within { border-color: #a5b4fc; background: #fff; box-shadow: 0 0 0 4px rgba(99,102,241,.08); }
  .input-group .input-icon { display: flex; align-items: center; padding: 0 14px; color: #94a3b8; flex-shrink: 0; }
  .input-group input { flex: 1; border: none; background: transparent; padding: 13px 14px 13px 0; font-size: 14px; color: #1e293b; outline: none; font-family: inherit; }
  .input-group input::placeholder { color: #94a3b8; }
  .input-group .input-suffix { display: flex; align-items: center; padding: 0 14px; flex-shrink: 0; }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #ecfdf5; color: #059669; }
  .badge-amber { background: #fffbeb; color: #d97706; }
  .badge-red { background: #fff1f2; color: #e11d48; }
  .badge-slate { background: #f1f5f9; color: #64748b; }

  /* ── Progress ── */
  .progress { height: 8px; border-radius: 8px; background: #f1f5f9; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 8px; background: #818cf8; transition: width .6s cubic-bezier(.4,0,.2,1); }

  /* ── Animations ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .animate-fade-up { animation: fadeUp .45s ease-out; }
  .animate-modal { animation: modalIn .25s ease-out; }

  /* ── Sidebar ── */
  .sidebar { width: 256px; background: #fff; border-right: 1px solid #e2e8f0; box-shadow: 2px 0 24px rgba(148,163,184,.08); }
  .nav-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 11px 16px; border-radius: 14px; font-size: 14px; font-weight: 550; border: none; cursor: pointer; transition: all .18s; text-align: left; background: transparent; color: #64748b; font-family: inherit; }
  .nav-btn:hover { background: #f8fafc; color: #334155; }
  .nav-btn.active { background: #eef2ff; color: #4f46e5; font-weight: 650; }
  .nav-btn.active:hover { background: #e0e7ff; }
  .nav-btn svg { flex-shrink: 0; width: 20px; height: 20px; }

  /* ── Table ── */
  .table-row { transition: background .12s; }
  .table-row:hover { background: #f8fafc; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

  /* ── Mobile ── */
  @media (max-width: 1023px) {
    .sidebar { position: fixed; top: 0; left: 0; height: 100dvh; z-index: 50; transform: translateX(-100%); transition: transform .25s; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.3); backdrop-filter: blur(4px); z-index: 45; }
    .sidebar-overlay.show { display: block; }
  }
</style>
</head>
<body>

<!-- ── Sidebar overlay (mobile) ── -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar ── -->
<aside id="sidebar" class="sidebar flex flex-col">
  <div style="padding:22px 20px; border-bottom:1px solid #f1f5f9;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;box-shadow:0 4px 12px rgba(99,102,241,.3);">H</div>
      <div>
        <div style="font-weight:650;font-size:15px;color:#1e293b;line-height:1.2;">HugBucket</div>
        <div style="font-size:12px;color:#94a3b8;">管理控制台</div>
      </div>
    </div>
  </div>

  <nav style="flex:1;padding:16px 14px;display:flex;flex-direction:column;gap:4px;">
    <button class="nav-btn active" data-page="overview">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      总览
    </button>
    <button class="nav-btn" data-page="buckets">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      存储桶
    </button>
    <button class="nav-btn" data-page="tokens">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      Token 管理
    </button>
  </nav>

  <div style="padding:16px 20px;border-top:1px solid #f1f5f9;">
    <div id="footer-status" style="display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8;">
      <span style="width:7px;height:7px;border-radius:50%;background:#cbd5e1;"></span> 加载中...
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<main style="margin-left:256px;min-height:100dvh;padding-bottom:60px;" id="main-content">

  <!-- Top bar -->
  <header style="position:sticky;top:0;z-index:30;background:rgba(248,250,252,.75);backdrop-filter:blur(16px);border-bottom:1px solid #e2e8f0;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;">
    <button class="btn btn-ghost" onclick="openSidebar()" style="display:none;padding:8px;" id="menu-btn">
      <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div style="display:flex;align-items:center;gap:12px;margin-left:auto;">
      <span id="clock" style="font-size:12px;color:#94a3b8;"></span>
      <button onclick="refreshData()" class="btn btn-outline" style="padding:7px 16px;font-size:13px;gap:6px;">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        刷新
      </button>
    </div>
  </header>

  <!-- ═══ Page: 总览 ═══ -->
  <div id="page-overview" style="padding:28px;">

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:28px;">
      <div class="card card-stat" style="padding:22px 24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span style="font-size:12px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">存储桶</span>
          <div style="width:38px;height:38px;border-radius:13px;background:#eef2ff;display:flex;align-items:center;justify-content:center;">
            <svg width="19" height="19" fill="none" stroke="#6366f1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          </div>
        </div>
        <div id="stat-buckets" style="font-size:38px;font-weight:700;color:#0f172a;line-height:1;">-</div>
      </div>

      <div class="card card-stat" style="padding:22px 24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span style="font-size:12px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">总存储量</span>
          <div style="width:38px;height:38px;border-radius:13px;background:#ecfdf5;display:flex;align-items:center;justify-content:center;">
            <svg width="19" height="19" fill="none" stroke="#10b981" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16"/></svg>
          </div>
        </div>
        <div id="stat-size" style="font-size:38px;font-weight:700;color:#0f172a;line-height:1;">-</div>
      </div>

      <div class="card card-stat" style="padding:22px 24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span style="font-size:12px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">文件总数</span>
          <div style="width:38px;height:38px;border-radius:13px;background:#fffbeb;display:flex;align-items:center;justify-content:center;">
            <svg width="19" height="19" fill="none" stroke="#f59e0b" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          </div>
        </div>
        <div id="stat-files" style="font-size:38px;font-weight:700;color:#0f172a;line-height:1;">-</div>
      </div>

      <div class="card card-stat" style="padding:22px 24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span style="font-size:12px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">健康 Token</span>
          <div style="width:38px;height:38px;border-radius:13px;background:#f0f9ff;display:flex;align-items:center;justify-content:center;">
            <svg width="19" height="19" fill="none" stroke="#0ea5e9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          </div>
        </div>
        <div id="stat-healthy" style="font-size:38px;font-weight:700;color:#0f172a;line-height:1;">-</div>
      </div>
    </div>

    <div class="card" style="padding:22px 26px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <h2 style="font-size:17px;font-weight:650;color:#1e293b;">存储桶用量</h2>
        <button data-page="buckets" class="nav-link btn btn-ghost" style="font-size:13px;font-weight:550;color:#6366f1;padding:6px 12px;">查看全部 →</button>
      </div>
      <div id="overview-buckets" style="display:flex;flex-direction:column;gap:4px;">
        <div style="text-align:center;padding:36px 0;color:#94a3b8;font-size:14px;">加载中…</div>
      </div>
    </div>
  </div>

  <!-- ═══ Page: 存储桶 ═══ -->
  <div id="page-buckets" style="display:none;padding:28px;">
    <h2 style="font-size:22px;font-weight:700;color:#0f172a;margin-bottom:22px;">存储桶</h2>
    <div class="card" style="overflow:hidden;">
      <table style="width:100%;font-size:14px;border-collapse:collapse;">
        <thead>
          <tr style="border-bottom:1px solid #f1f5f9;">
            <th style="text-align:left;padding:15px 22px;font-size:11px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">名称</th>
            <th style="text-align:left;padding:15px 22px;font-size:11px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">命名空间</th>
            <th style="text-align:right;padding:15px 22px;font-size:11px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">用量</th>
            <th style="text-align:right;padding:15px 22px;font-size:11px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">文件数</th>
            <th style="text-align:right;padding:15px 22px;font-size:11px;font-weight:650;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">可见性</th>
          </tr>
        </thead>
        <tbody id="buckets-table">
          <tr><td colspan="5" style="text-align:center;padding:48px 0;color:#94a3b8;font-size:14px;">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ═══ Page: Token 管理 ═══ -->
  <div id="page-tokens" style="display:none;padding:28px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 style="font-size:22px;font-weight:700;color:#0f172a;">Token 管理</h2>
        <p style="font-size:13px;color:#94a3b8;margin-top:4px;">配置多个 HF Token 实现负载均衡</p>
      </div>
      <button onclick="showAddTokenModal()" class="btn btn-primary" style="padding:12px 22px;">
        <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3" d="M12 4v16m8-8H4"/></svg>
        添加 Token
      </button>
    </div>

    <div class="card" style="padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;gap:14px;font-size:14px;">
      <div style="width:38px;height:38px;border-radius:13px;background:#eef2ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="18" height="18" fill="none" stroke="#6366f1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <span style="color:#64748b;">负载均衡策略：</span>
        <span style="color:#1e293b;font-weight:650;" id="strategy-label">Round Robin</span>
        <span style="color:#94a3b8;margin-left:6px;">— 请求依次轮流分发到健康 Token</span>
      </div>
    </div>

    <div id="tokens-list" style="display:flex;flex-direction:column;gap:12px;">
      <div style="text-align:center;padding:40px 0;color:#94a3b8;font-size:14px;">加载中…</div>
    </div>
  </div>
</main>

<!-- ═══ Add Token Modal ═══ -->
<div id="add-token-overlay" style="display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)hideAddTokenModal()">
  <div id="add-token-backdrop" style="position:absolute;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(6px);"></div>
  <div id="add-token-dialog" style="position:relative;background:#fff;border-radius:24px;padding:32px;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(15,23,42,.18);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h3 style="font-size:20px;font-weight:700;color:#0f172a;">添加 HF Token</h3>
      <button onclick="hideAddTokenModal()" class="btn btn-ghost" style="padding:8px;border-radius:12px;width:36px;height:36px;">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <form onsubmit="addToken(event)" style="display:flex;flex-direction:column;gap:20px;">
      <div>
        <label style="display:block;font-size:13px;font-weight:650;color:#475569;margin-bottom:8px;">HF Token <span style="color:#f43f5e;">*</span></label>
        <div class="input-group">
          <div class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          </div>
          <input type="password" id="new-token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxx" required autocomplete="off">
          <div class="input-suffix">
            <button type="button" onclick="toggleTokenVisibility()" style="background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;" id="toggle-vis-btn">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="eye-off-icon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9.27-3.11-11-7 1.08-2.44 2.93-4.39 5.22-5.53m2.78-1.03A9.8 9.8 0 0112 5c5 0 9.27 3.11 11 7a11.7 11.7 0 01-4.22 5.19"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 3l18 18M9.88 9.88a3 3 0 104.24 4.24"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div>
        <label style="display:block;font-size:13px;font-weight:650;color:#475569;margin-bottom:8px;">标签 <span style="color:#94a3b8;font-weight:400;">（选填）</span></label>
        <div class="input-group">
          <div class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
          </div>
          <input type="text" id="new-label" placeholder="例如：production、personal">
        </div>
      </div>

      <div id="add-token-error" style="display:none;font-size:13px;color:#f43f5e;background:#fff1f2;padding:12px 16px;border-radius:12px;"></div>

      <div style="display:flex;gap:12px;padding-top:4px;">
        <button type="submit" class="btn btn-primary" style="flex:1;padding:13px;">确认添加</button>
        <button type="button" onclick="hideAddTokenModal()" class="btn btn-outline" style="flex:1;padding:13px;">取消</button>
      </div>
    </form>
  </div>
</div>

<script>
(function() {
  // ── Polyfill: mobile menu button visibility ──
  const mq = window.matchMedia('(max-width: 1023px)');
  const updateMenuBtn = () => { document.getElementById('menu-btn').style.display = mq.matches ? '' : 'none'; };
  mq.addEventListener('change', updateMenuBtn);
  updateMenuBtn();
})();

// ── State ──
let currentPage = 'overview', bucketsData = null, statusData = null;

// ── Utils ──
function $(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatBytes(b) {
  if (!b) return '0 B';
  const k = 1024, u = ['B','KiB','MiB','GiB','TiB'];
  const i = Math.min(Math.floor(Math.log(b)/Math.log(k)), u.length-1);
  return (b/Math.pow(k,i)).toFixed(i===0?0:1)+' '+u[i];
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}

function timeAgo(ts) {
  if (!ts) return '从未';
  const s = Math.floor(Date.now()/1000 - ts);
  if (s<60) return '刚刚';
  if (s<3600) return Math.floor(s/60)+' 分钟前';
  if (s<86400) return Math.floor(s/3600)+' 小时前';
  return Math.floor(s/86400)+' 天前';
}

// ── Sidebar ──
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

// ── Navigation ──
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.querySelectorAll('.nav-link[data-page]').forEach(l => { l.style.display = l.dataset.page === page ? 'none' : ''; });
  $('page-overview').style.display = page==='overview' ? '' : 'none';
  $('page-buckets').style.display = page==='buckets' ? '' : 'none';
  $('page-tokens').style.display = page==='tokens' ? '' : 'none';
  if (page!=='overview' || !bucketsData) refreshData(); else if (bucketsData) renderAll();
  closeSidebar();
}

document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => navigate(b.dataset.page)));
document.querySelectorAll('.nav-link[data-page]').forEach(l => l.addEventListener('click', e => { e.preventDefault(); navigate(l.dataset.page); }));

// ── Data ──
async function api(path, opts={}) {
  const r = await fetch(path, opts);
  if (!r.ok) { const b = await r.json().catch(()=>({})); throw new Error(b.error||'HTTP '+r.status); }
  return r.json();
}

async function refreshData() {
  try {
    const [buckets, status] = await Promise.all([api('/api/buckets'), api('/api/status')]);
    bucketsData = buckets; statusData = status;
    renderAll(); updateFooter(true);
  } catch(e) { console.error(e); updateFooter(false); }
}

function updateFooter(ok) {
  const el = $('footer-status');
  el.innerHTML = ok
    ? `<span style="width:7px;height:7px;border-radius:50%;background:#10b981;"></span> 系统正常`+(statusData?' · '+statusData.token_pool.total+' Token':'')
    : `<span style="width:7px;height:7px;border-radius:50%;background:#f43f5e;"></span> 连接失败`;
}

// ── Render ──
function renderAll() { renderOverview(); renderBucketsTable(); renderTokensList(); }

function renderOverview() {
  const d = bucketsData; if (!d) return;
  $('stat-buckets').textContent = d.total;
  $('stat-size').textContent = formatBytes(d.total_size);
  $('stat-files').textContent = formatNum(d.total_files);
  if (statusData) $('stat-healthy').textContent = statusData.token_pool.healthy+'/'+statusData.token_pool.total;

  const buckets = d.buckets.slice(0,5);
  const maxSize = buckets.length ? Math.max(...buckets.map(b=>b.size),1) : 1;
  $('overview-buckets').innerHTML = buckets.length===0
    ? `<div style="text-align:center;padding:36px 0;"><div style="width:56px;height:56px;border-radius:18px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><svg width="26" height="26" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p style="font-size:14px;color:#94a3b8;">暂无存储桶 — 请先配置 HF Token</p></div>`
    : buckets.map((b,i) => `
      <div style="display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:14px;transition:background .15s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
        <div style="width:34px;height:34px;border-radius:12px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:650;color:#64748b;flex-shrink:0;">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:14px;font-weight:600;color:#334155;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(b.name)}</span>
            <span style="font-size:12px;color:#94a3b8;flex-shrink:0;margin-left:12px;">${formatBytes(b.size)}</span>
          </div>
          <div class="progress"><div class="progress-bar" style="width:${(b.size/maxSize*100).toFixed(0)}%"></div></div>
        </div>
        <span style="font-size:12px;color:#94a3b8;flex-shrink:0;">${esc(b.namespace)}</span>
      </div>`).join('');
}

function renderBucketsTable() {
  const d = bucketsData; if (!d) return;
  $('buckets-table').innerHTML = d.buckets.length===0
    ? `<tr><td colspan="5" style="text-align:center;padding:56px 0;"><div style="width:56px;height:56px;border-radius:18px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><svg width="26" height="26" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p style="font-size:14px;color:#94a3b8;">暂无存储桶</p></td></tr>`
    : d.buckets.map(b => `
      <tr class="table-row" style="border-bottom:1px solid #f8fafc;">
        <td style="padding:14px 22px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:30px;height:30px;border-radius:10px;background:${b.private?'#fffbeb':'#ecfdf5'};display:flex;align-items:center;justify-content:center;">
              <svg width="14" height="14" fill="none" stroke="${b.private?'#f59e0b':'#10b981'}" viewBox="0 0 24 24">
                ${b.private
                  ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>'
                  : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>'}
              </svg>
            </div>
            <span style="font-weight:600;color:#1e293b;">${esc(b.name)}</span>
          </div>
        </td>
        <td style="padding:14px 22px;color:#64748b;font-size:13px;">${esc(b.namespace)}</td>
        <td style="padding:14px 22px;text-align:right;font-weight:600;color:#334155;">${formatBytes(b.size)}</td>
        <td style="padding:14px 22px;text-align:right;color:#64748b;">${formatNum(b.total_files)}</td>
        <td style="padding:14px 22px;text-align:right;"><span class="badge ${b.private?'badge-amber':'badge-green'}">${b.private?'私有':'公开'}</span></td>
      </tr>`).join('');
}

function renderTokensList() {
  const s = statusData; if (!s) return;
  const tokens = s.token_pool.tokens;
  $('strategy-label').textContent = s.token_pool.strategy==='round_robin'?'Round Robin':s.token_pool.strategy;
  $('tokens-list').innerHTML = tokens.length===0
    ? `<div class="card" style="padding:48px 24px;text-align:center;">
        <div style="width:56px;height:56px;border-radius:18px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
          <svg width="26" height="26" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        </div>
        <p style="font-weight:650;color:#1e293b;margin-bottom:4px;">尚未配置 Token</p>
        <p style="font-size:13px;color:#94a3b8;margin-bottom:20px;">添加 HF Token 以开始管理存储桶</p>
        <button onclick="navigate('tokens');showAddTokenModal()" class="btn btn-primary">添加第一个 Token</button>
      </div>`
    : tokens.map(t => `
      <div class="card" style="padding:18px 22px;transition:all .2s;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;">
          <div style="display:flex;align-items:center;gap:14px;min-width:0;">
            <div style="width:42px;height:42px;border-radius:15px;background:${t.healthy?'#ecfdf5':'#fff1f2'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="20" height="20" fill="none" stroke="${t.healthy?'#10b981':'#f43f5e'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <div style="min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
                <span style="font-weight:650;color:#1e293b;font-size:14px;">${esc(t.label||'未命名')}</span>
                <span class="badge ${t.healthy?'badge-green':'badge-red'}">${t.healthy?'健康':'异常'}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8;flex-wrap:wrap;">
                <span style="font-weight:550;color:#64748b;">${esc(t.token_preview)}</span>
                <span>·</span>
                <span>${esc(t.namespace)}</span>
                <span>·</span>
                <span>${timeAgo(t.last_checked)}</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
            <button onclick="resolveToken(${t.index})" class="btn btn-ghost" title="重新解析">🔄</button>
            <button onclick="removeToken(${t.index})" class="btn btn-danger-ghost" title="删除">🗑</button>
          </div>
        </div>
      </div>`).join('');
}

// ── Modal ──
function showAddTokenModal() {
  const overlay = $('add-token-overlay');
  const dialog = $('add-token-dialog');
  overlay.style.display = 'flex';
  overlay.querySelector('#add-token-backdrop').style.animation = 'overlayIn .2s ease-out';
  dialog.style.animation = 'modalIn .25s ease-out';
  setTimeout(() => $('new-token').focus(), 100);
}

function hideAddTokenModal() {
  $('add-token-overlay').style.display = 'none';
  $('new-token').value = '';
  $('new-label').value = '';
  $('add-token-error').style.display = 'none';
  $('new-token').type = 'password';
}

function toggleTokenVisibility() {
  const inp = $('new-token');
  inp.type = inp.type==='password'?'text':'password';
}

async function addToken(e) {
  e.preventDefault();
  const errEl = $('add-token-error');
  errEl.style.display = 'none';
  try {
    await api('/api/tokens', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:$('new-token').value.trim(), label:$('new-label').value.trim()})
    });
    hideAddTokenModal();
    await refreshData();
    navigate('tokens');
  } catch(ex) {
    errEl.textContent = ex.message;
    errEl.style.display = '';
  }
}

async function removeToken(index) {
  if (!confirm('确认删除此 Token？')) return;
  try { await api('/api/tokens/'+index, {method:'DELETE'}); await refreshData(); } catch(e) { alert(e.message); }
}

async function resolveToken(index) {
  try { await api('/api/tokens/'+index+'/resolve', {method:'POST'}); await refreshData(); } catch(e) { alert(e.message); }
}

// ── Clock ──
(function tick() { $('clock').textContent = new Date().toLocaleString('zh-CN',{hour12:false}); setTimeout(tick, 1000); })();

// ── Init ──
refreshData();
</script>
