<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HugBucket</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #f0f4f8;
    --surface:   #ffffff;
    --border:    #e2e8f0;
    --text:      #1e293b;
    --text-dim:  #64748b;
    --text-muted:#94a3b8;
    --brand:     #6366f1;
    --brand-lt:  #eef2ff;
    --brand-bg:  #e0e7ff;
    --green-lt:  #ecfdf5;
    --green:     #10b981;
    --amber-lt:  #fffbeb;
    --amber:     #f59e0b;
    --red-lt:    #fff1f2;
    --red:       #f43f5e;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
    --shadow-md: 0 4px 16px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.03);
    --shadow-lg: 0 12px 32px rgba(0,0,0,.07), 0 4px 8px rgba(0,0,0,.04);
    --shadow-xl: 0 24px 56px rgba(0,0,0,.10);
    --radius-sm: 10px;
    --radius:    16px;
    --radius-lg: 20px;
    --radius-xl: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }

  /* ═══ Layout ═══ */
  .app { display: flex; min-height: 100dvh; }

  /* ═══ Sidebar ═══ */
  .sidebar {
    width: 248px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    box-shadow: var(--shadow-md); position: sticky; top: 0; height: 100dvh; z-index: 40;
  }
  .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid #f1f5f9; }
  .sidebar-brand-inner { display: flex; align-items: center; gap: 12px; }
  .sidebar-logo {
    width: 40px; height: 40px; border-radius: var(--radius-sm); flex-shrink: 0;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 18px;
    box-shadow: 0 4px 12px rgba(99,102,241,.30);
  }
  .sidebar-brand-name { font-weight: 650; font-size: 15px; color: var(--text); }
  .sidebar-brand-sub  { font-size: 12px; color: var(--text-muted); }

  .sidebar-nav { flex: 1; padding: 12px 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .sidebar-nav button {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 11px 14px; border-radius: var(--radius); border: none;
    font-size: 14px; font-weight: 550; color: var(--text-dim);
    background: transparent; cursor: pointer; transition: all .18s;
    text-align: left; font-family: inherit;
  }
  .sidebar-nav button:hover  { background: #f8fafc; color: var(--text); }
  .sidebar-nav button.active { background: var(--brand-lt); color: var(--brand); font-weight: 650; }
  .sidebar-nav button svg { width: 20px; height: 20px; flex-shrink: 0; stroke-width: 1.8; }

  .sidebar-footer { padding: 14px 20px; border-top: 1px solid #f1f5f9; font-size: 12px; color: var(--text-muted); }

  /* ═══ Main ═══ */
  .main { flex: 1; min-width: 0; }
  .topbar {
    position: sticky; top: 0; z-index: 30; height: 60px;
    background: rgba(240,244,248,.70); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 28px; gap: 12px;
  }
  .page { padding: 28px; display: none; }
  .page.active { display: block; }

  /* ═══ Cards ═══ */
  .card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
  .stat-card {
    padding: 22px 24px; cursor: default; transition: all .25s;
  }
  .stat-card:hover { box-shadow: var(--shadow-lg); border-color: #c7d2fe; transform: translateY(-2px); }
  .stat-label { font-size: 12px; font-weight: 650; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
  .stat-value { font-size: 36px; font-weight: 700; color: #0f172a; line-height: 1.1; }
  .stat-icon {
    width: 38px; height: 38px; border-radius: var(--radius-sm); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* ═══ Buttons ═══ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: all .18s; white-space: nowrap;
    font-family: inherit;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,.25); }
  .btn-primary:hover { background: #4f46e5; box-shadow: 0 6px 18px rgba(99,102,241,.32); }
  .btn-outline { background: #fff; color: var(--text-dim); border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
  .btn-outline:hover { background: #f8fafc; border-color: #cbd5e1; }
  .btn-ghost { background: transparent; color: var(--text-dim); padding: 8px; border-radius: var(--radius-sm); }
  .btn-ghost:hover { background: #f1f5f9; color: var(--text); }
  .btn-ghost.danger { color: var(--red); }
  .btn-ghost.danger:hover { background: #fff1f2; }

  /* ═══ Input Groups ═══ */
  .field-label { display: block; font-size: 13px; font-weight: 650; color: var(--text-dim); margin-bottom: 8px; }
  .field-label .required { color: var(--red); }
  .field-label .optional { color: var(--text-muted); font-weight: 400; }

  .input-group {
    display: flex; align-items: center; background: #f8fafc;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    transition: all .2s; overflow: hidden;
  }
  .input-group:focus-within { background: #fff; border-color: #a5b4fc; box-shadow: 0 0 0 4px rgba(99,102,241,.08); }
  .input-group svg { color: var(--text-muted); flex-shrink: 0; }
  .input-group .prefix { padding: 0 0 0 14px; }
  .input-group .suffix { padding: 0 14px 0 0; display: flex; align-items: center; }
  .input-group input {
    flex: 1; border: none; background: transparent; padding: 13px 14px;
    font-size: 14px; color: var(--text); outline: none; font-family: inherit;
    min-width: 0;
  }
  .input-group input::placeholder { color: var(--text-muted); }
  .suffix-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; color: var(--text-muted); display: flex; }
  .suffix-btn:hover { color: var(--text-dim); background: #e2e8f0; }

  /* ═══ Badge ═══ */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .badge-green { background: var(--green-lt); color: var(--green); }
  .badge-red   { background: var(--red-lt);   color: var(--red); }
  .badge-amber { background: var(--amber-lt); color: var(--amber); }

  /* ═══ Table ═══ */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 14px 22px; font-size: 11px; font-weight: 650; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  td { padding: 14px 22px; }
  tr.row { border-bottom: 1px solid #f8fafc; transition: background .12s; }
  tr.row:hover { background: #f8fafc; }
  tr.row td:last-child, th:last-child { text-align: right; }
  tr.row td:nth-child(3), th:nth-child(3) { text-align: right; }
  tr.row td:nth-child(4), th:nth-child(4) { text-align: right; }

  /* ═══ Progress ═══ */
  .progress { height: 7px; border-radius: 7px; background: #f1f5f9; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 7px; background: #a5b4fc; transition: width .6s cubic-bezier(.4,0,.2,1); }

  /* ═══ Modal ═══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(15,23,42,.35); backdrop-filter: blur(6px); }
  .modal-dialog {
    position: relative; background: var(--surface); border-radius: var(--radius-xl);
    padding: 32px; width: 100%; max-width: 440px;
    box-shadow: var(--shadow-xl);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title  { font-size: 20px; font-weight: 700; color: #0f172a; }
  .modal-close  {
    width: 36px; height: 36px; border-radius: var(--radius-sm); border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all .15s;
  }
  .modal-close:hover { background: #f1f5f9; color: var(--text); }
  .modal-form   { display: flex; flex-direction: column; gap: 20px; }
  .modal-error  { display: none; font-size: 13px; color: var(--red); background: #fff1f2; padding: 12px 16px; border-radius: var(--radius-sm); }
  .modal-actions { display: flex; gap: 12px; padding-top: 4px; }
  .modal-actions .btn { flex: 1; padding: 13px; }

  /* ═══ Token card ═══ */
  .token-card { padding: 18px 22px; }
  .token-card:hover { border-color: #c7d2fe; }

  /* ═══ Animations ═══ */
  @keyframes fadeUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  .anim-fade-up { animation: fadeUp .4s ease-out; }
  .anim-modal   { animation: modalIn .25s ease-out; }
  .anim-fade-in { animation: fadeIn .2s ease-out; }

  /* ═══ Scrollbar ═══ */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

  /* ═══ Mobile ═══ */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); transition: transform .25s; z-index: 50; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.3); backdrop-filter: blur(4px); z-index: 45; }
    .sidebar-overlay.show { display: block; }
    .page { padding: 20px 16px; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ═══ Sidebar Overlay (mobile) ═══ -->
  <div id="sb-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- ═══ Sidebar ═══ -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-inner">
        <div class="sidebar-logo">H</div>
        <div>
          <div class="sidebar-brand-name">HugBucket</div>
          <div class="sidebar-brand-sub">管理控制台</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="active" data-page="overview">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        总览
      </button>
      <button data-page="buckets">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        存储桶
      </button>
      <button data-page="tokens">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Token 管理
      </button>
    </nav>

    <div class="sidebar-footer" id="footer-status">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#cbd5e1;margin-right:7px;"></span>加载中...
    </div>
  </aside>

  <!-- ═══ Main ═══ -->
  <div class="main">
    <header class="topbar">
      <button id="menu-btn" class="btn btn-outline" style="display:none;padding:8px 12px;margin-right:auto;" onclick="openSidebar()">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span id="clock" style="font-size:12px;color:var(--text-muted);"></span>
      <button onclick="refreshData()" class="btn btn-outline" style="padding:7px 16px;font-size:13px;">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        刷新
      </button>
    </header>

    <!-- ═══ 总览 ═══ -->
    <div id="page-overview" class="page active anim-fade-up">

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px;">
        <div class="card stat-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span class="stat-label">存储桶</span>
            <div class="stat-icon" style="background:var(--brand-lt);"><svg width="18" height="18" fill="none" stroke="var(--brand)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>
          </div>
          <div class="stat-value" id="stat-buckets">-</div>
        </div>
        <div class="card stat-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span class="stat-label">总存储量</span>
            <div class="stat-icon" style="background:var(--green-lt);"><svg width="18" height="18" fill="none" stroke="var(--green)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16"/></svg></div>
          </div>
          <div class="stat-value" id="stat-size">-</div>
        </div>
        <div class="card stat-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span class="stat-label">文件总数</span>
            <div class="stat-icon" style="background:var(--amber-lt);"><svg width="18" height="18" fill="none" stroke="var(--amber)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>
          </div>
          <div class="stat-value" id="stat-files">-</div>
        </div>
        <div class="card stat-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span class="stat-label">健康 Token</span>
            <div class="stat-icon" style="background:#f0f9ff;"><svg width="18" height="18" fill="none" stroke="#0ea5e9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg></div>
          </div>
          <div class="stat-value" id="stat-healthy">-</div>
        </div>
      </div>

      <div class="card" style="padding:22px 26px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <h2 style="font-size:17px;font-weight:650;">存储桶用量</h2>
          <button data-page="buckets" class="btn btn-ghost" style="font-size:13px;font-weight:550;color:var(--brand);padding:6px 12px;">查看全部 →</button>
        </div>
        <div id="overview-buckets"><div style="text-align:center;padding:36px;color:var(--text-muted);">加载中…</div></div>
      </div>
    </div>

    <!-- ═══ 存储桶 ═══ -->
    <div id="page-buckets" class="page anim-fade-up">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <h2 style="font-size:22px;font-weight:700;color:#0f172a;">存储桶</h2>
        <div style="display:flex;gap:8px;">
          <button onclick="showBucketModal()" class="btn btn-outline" style="padding:10px 18px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3" d="M12 4v16m8-8H4"/></svg>
            创建桶
          </button>
          <button onclick="ensureBuckets()" class="btn btn-primary" style="padding:10px 18px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            一键确保
          </button>
        </div>
      </div>
      <div class="card" style="overflow:auto;">
        <table>
          <thead><tr><th>名称</th><th>命名空间</th><th>用量</th><th>文件数</th><th>可见性</th></tr></thead>
          <tbody id="buckets-table"><tr><td colspan="5" style="text-align:center;padding:48px;color:var(--text-muted);">加载中…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ═══ Token 管理 ═══ -->
    <div id="page-tokens" class="page anim-fade-up">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 style="font-size:22px;font-weight:700;color:#0f172a;">Token 管理</h2>
          <p style="font-size:13px;color:var(--text-muted);margin-top:4px;">配置多个 HF Token 实现负载均衡</p>
        </div>
        <button onclick="showAddTokenModal()" class="btn btn-primary" style="padding:12px 22px;">
          <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3" d="M12 4v16m8-8H4"/></svg>
          添加 Token
        </button>
      </div>

      <div class="card" style="padding:16px 22px;margin-bottom:16px;display:flex;align-items:center;gap:14px;font-size:14px;">
        <div class="stat-icon" style="background:var(--brand-lt);"><svg width="17" height="17" fill="none" stroke="var(--brand)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
        <div><span style="color:var(--text-dim);">负载均衡策略：</span><span style="font-weight:650;" id="strategy-label">Round Robin</span><span style="color:var(--text-muted);margin-left:6px;">— 请求依次轮流分发到健康 Token</span></div>
      </div>

      <div id="tokens-list" style="display:flex;flex-direction:column;gap:10px;">
        <div style="text-align:center;padding:40px;color:var(--text-muted);">加载中…</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ Modal ═══ -->
<div id="modal" class="modal-overlay" onclick="if(event.target===this)hideModal()">
  <div class="modal-backdrop anim-fade-in"></div>
  <div class="modal-dialog anim-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">添加 HF Token</h3>
      <button class="modal-close" onclick="hideModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <form class="modal-form" onsubmit="addToken(event)">
      <div>
        <label class="field-label">HF Token <span class="required">*</span></label>
        <div class="input-group">
          <span class="prefix"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg></span>
          <input type="password" id="new-token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxx" required autocomplete="off">
          <span class="suffix"><button type="button" class="suffix-btn" onclick="toggleTokenVis()" title="显示/隐藏"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="eye-icon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9.27-3.11-11-7 1.08-2.44 2.93-4.39 5.22-5.53m2.78-1.03A9.8 9.8 0 0112 5c5 0 9.27 3.11 11 7a11.7 11.7 0 01-4.22 5.19"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 3l18 18M9.88 9.88a3 3 0 104.24 4.24"/></svg></button></span>
        </div>
      </div>

      <div>
        <label class="field-label">标签 <span class="optional">（选填）</span></label>
        <div class="input-group">
          <span class="prefix"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg></span>
          <input type="text" id="new-label" placeholder="例如：production、personal">
        </div>
      </div>

      <div class="modal-error" id="modal-error"></div>

      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">确认添加</button>
        <button type="button" class="btn btn-outline" onclick="hideModal()">取消</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ Bucket Create Modal ═══ -->
<div id="bucket-modal" class="modal-overlay" onclick="if(event.target===this)hideBucketModal()">
  <div class="modal-backdrop anim-fade-in"></div>
  <div class="modal-dialog anim-modal" onclick="event.stopPropagation()" style="max-width:460px;">
    <div class="modal-header">
      <h3 class="modal-title" id="bucket-modal-title">创建存储桶</h3>
      <button class="modal-close" onclick="hideBucketModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form class="modal-form" onsubmit="createBucket(event)" id="bucket-form">
      <div>
        <label class="field-label">选择 Token <span class="required">*</span></label>
        <select id="bucket-token" class="input-group" style="padding:13px 14px;border-radius:var(--radius);width:100%;">
          <option value="">-- 自动（least-in-flight）--</option>
        </select>
      </div>
      <div>
        <label class="field-label">桶名 <span class="required">*</span></label>
        <div class="input-group">
          <span class="prefix"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></span>
          <input type="text" id="bucket-name" placeholder="my-bucket">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="bucket-private" style="accent-color:var(--brand);width:17px;height:17px;">
        <label for="bucket-private" style="font-size:14px;color:var(--text-dim);cursor:pointer;">创建为私有桶</label>
      </div>
      <div class="modal-error" id="bucket-modal-error"></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" id="bucket-submit-btn">确认创建</button>
        <button type="button" class="btn btn-outline" onclick="hideBucketModal()">取消</button>
      </div>
    </form>
  </div>
</div>

<script>
// ═══ State ═══
let curPage = 'overview', bucketsData = null, statusData = null;

// ═══ Helpers ═══
const $ = id => document.getElementById(id);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

function fmtBytes(b) {
  if (!b) return '0 B';
  const u = ['B','KiB','MiB','GiB','TiB'], k = 1024;
  const i = Math.min(Math.floor(Math.log(b)/Math.log(k)), u.length-1);
  return (b/Math.pow(k,i)).toFixed(i?1:0)+' '+u[i];
}
function fmtNum(n) {
  if (n>=1e9) return (n/1e9).toFixed(1)+'B';
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}
function timeAgo(ts) {
  if (!ts) return '从未';
  const s = Math.floor(Date.now()/1000 - ts);
  if (s<60) return '刚刚';
  if (s<3600) return Math.floor(s/60)+' 分钟前';
  if (s<86400) return Math.floor(s/3600)+' 小时前';
  return Math.floor(s/86400)+' 天前';
}

// ═══ Sidebar ═══
function openSidebar()  { $('sidebar').classList.add('open'); $('sb-overlay').classList.add('show'); }
function closeSidebar() { $('sidebar').classList.remove('open'); $('sb-overlay').classList.remove('show'); }

// Mobile menu button
(function(){
  const mq = window.matchMedia('(max-width:768px)');
  const btn = $('menu-btn');
  mq.addEventListener('change', () => { btn.style.display = mq.matches ? '' : 'none'; });
  btn.style.display = mq.matches ? '' : 'none';
})();

// ═══ Navigation ═══
function navigate(page) {
  curPage = page;
  document.querySelectorAll('.sidebar-nav button').forEach(b => b.classList.toggle('active', b.dataset.page===page));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id==='page-'+page));
  document.querySelectorAll('[data-page]').forEach(el => { if (el.tagName==='BUTTON' && el.dataset.page===page && !el.closest('.sidebar-nav')) el.style.display='none'; });
  if (page!=='overview' || !bucketsData) refreshData(); else if (bucketsData) renderAll();
  closeSidebar();
}
document.querySelectorAll('.sidebar-nav button').forEach(b => b.addEventListener('click', () => navigate(b.dataset.page)));
document.querySelectorAll('[data-page]').forEach(el => { if (!el.closest('.sidebar-nav')) el.addEventListener('click', e => { e.preventDefault(); navigate(el.dataset.page); }); });

// ═══ API ═══
async function api(path, opts={}) {
  const r = await fetch(path, opts);
  if (!r.ok) { const b = await r.json().catch(()=>({})); throw new Error(b.error||'HTTP '+r.status); }
  return r.json();
}
async function refreshData() {
  try {
    const [buckets, status] = await Promise.all([api('/api/buckets'), api('/api/status')]);
    bucketsData = buckets; statusData = status;
    renderAll(); updateFooter(true);
  } catch(e) { console.error(e); updateFooter(false); }
}
function updateFooter(ok) {
  $('footer-status').innerHTML = ok
    ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:7px;"></span>系统正常`+(statusData?' · '+statusData.token_pool.total+' Token':'')
    : `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-right:7px;"></span>连接失败`;
}

// ═══ Render ═══
function renderAll() { renderOverview(); renderBuckets(); renderTokens(); }

function renderOverview() {
  const d = bucketsData; if (!d) return;
  $('stat-buckets').textContent = d.total;
  $('stat-size').textContent = fmtBytes(d.total_size);
  $('stat-files').textContent = fmtNum(d.total_files);
  if (statusData) $('stat-healthy').textContent = statusData.token_pool.healthy+'/'+statusData.token_pool.total;

  const buckets = d.buckets.slice(0,5);
  const maxSize = buckets.length ? Math.max(...buckets.map(b=>b.size),1) : 1;
  $('overview-buckets').innerHTML = buckets.length===0
    ? `<div style="text-align:center;padding:42px;"><div style="width:56px;height:56px;border-radius:18px;background:#f1f5f9;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;"><svg width="26" height="26" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p style="color:var(--text-muted);">暂无存储桶 — 请先配置 HF Token</p></div>`
    : buckets.map((b,i) => `
      <div style="display:flex;align-items:center;gap:14px;padding:10px 6px;border-radius:var(--radius);" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
        <div style="width:32px;height:32px;border-radius:var(--radius-sm);background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:650;color:var(--text-dim);flex-shrink:0;">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
            <span style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(b.name)}</span>
            <span style="font-size:12px;color:var(--text-muted);margin-left:12px;flex-shrink:0;">${fmtBytes(b.size)}</span>
          </div>
          <div class="progress"><div class="progress-fill" style="width:${(b.size/maxSize*100).toFixed(0)}%"></div></div>
        </div>
        <span style="font-size:12px;color:var(--text-muted);flex-shrink:0;min-width:60px;text-align:right;">${esc(b.namespace)}</span>
      </div>`).join('');
}

function renderBuckets() {
  const d = bucketsData; if (!d) return;
  $('buckets-table').innerHTML = d.buckets.length===0
    ? `<tr><td colspan="5" style="text-align:center;padding:56px;"><div style="width:56px;height:56px;border-radius:18px;background:#f1f5f9;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;"><svg width="26" height="26" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p style="color:var(--text-muted);">暂无存储桶</p></td></tr>`
    : d.buckets.map(b => `
      <tr class="row">
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:30px;height:30px;border-radius:10px;background:${b.private?'var(--amber-lt)':'var(--green-lt)'};display:flex;align-items:center;justify-content:center;">
              <svg width="14" height="14" fill="none" stroke="${b.private?'var(--amber)':'var(--green)'}" viewBox="0 0 24 24">
                ${b.private
                  ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>'
                  : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>'}
              </svg>
            </div>
            <span style="font-weight:600;">${esc(b.name)}</span>
          </div>
        </td>
        <td style="color:var(--text-dim);font-size:13px;">${esc(b.namespace)}</td>
        <td style="font-weight:600;">${fmtBytes(b.size)}</td>
        <td style="color:var(--text-dim);">${fmtNum(b.total_files)}</td>
        <td><span class="badge ${b.private?'badge-amber':'badge-green'}">${b.private?'私有':'公开'}</span></td>
      </tr>`).join('');
}

function renderTokens() {
  const s = statusData; if (!s) return;
  const tokens = s.token_pool.tokens;
  $('strategy-label').textContent = s.token_pool.strategy==='round_robin'?'Round Robin':s.token_pool.strategy;
  $('tokens-list').innerHTML = tokens.length===0
    ? `<div class="card" style="padding:48px 24px;text-align:center;">
        <div style="width:56px;height:56px;border-radius:18px;background:#f1f5f9;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;"><svg width="26" height="26" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg></div>
        <p style="font-weight:650;font-size:15px;margin-bottom:4px;">尚未配置 Token</p>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">添加 HF Token 以开始管理存储桶</p>
        <button onclick="navigate('tokens');showAddTokenModal()" class="btn btn-primary">添加第一个 Token</button>
      </div>`
    : tokens.map(t => `
      <div class="card token-card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;">
          <div style="display:flex;align-items:center;gap:14px;min-width:0;">
            <div style="width:42px;height:42px;border-radius:14px;background:${t.healthy?'var(--green-lt)':'var(--red-lt)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="20" height="20" fill="none" stroke="${t.healthy?'var(--green)':'var(--red)'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <div style="min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
                <span style="font-weight:650;font-size:14px;">${esc(t.label||'未命名')}</span>
                <span class="badge ${t.healthy?'badge-green':'badge-red'}">${t.healthy?'健康':'异常'}</span>
              </div>
              <div style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <span style="font-weight:550;color:var(--text-dim);">${esc(t.token_preview)}</span><span>·</span><span>${esc(t.namespace)}</span><span>·</span><span>${timeAgo(t.last_checked)}</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;">
            <button onclick="resolveToken(${t.index})" class="btn btn-ghost" title="重新解析">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
            <button onclick="removeToken(${t.index})" class="btn btn-ghost danger" title="删除">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
      </div>`).join('');
}

// ═══ Modal ═══
function showAddTokenModal() { $('modal').classList.add('show'); setTimeout(()=>$('new-token').focus(),100); }
function hideModal() { $('modal').classList.remove('show'); $('new-token').value=''; $('new-label').value=''; $('modal-error').style.display='none'; $('new-token').type='password'; }
function toggleTokenVis() { const i=$('new-token'); i.type=i.type==='password'?'text':'password'; }

async function addToken(e) {
  e.preventDefault();
  const err = $('modal-error'); err.style.display='none';
  try {
    await api('/api/tokens',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:$('new-token').value.trim(),label:$('new-label').value.trim()})});
    hideModal(); await refreshData(); navigate('tokens');
  } catch(ex) { err.textContent=ex.message; err.style.display=''; }
}

async function removeToken(i) { if(!confirm('确认删除此 Token？'))return; try{await api('/api/tokens/'+i,{method:'DELETE'});await refreshData();}catch(e){alert(e.message);} }
async function resolveToken(i) { try{await api('/api/tokens/'+i+'/resolve',{method:'POST'});await refreshData();}catch(e){alert(e.message);} }

// ═══ Bucket Modal ═══
function populateTokenSelect() {
  const sel = $('bucket-token');
  sel.innerHTML = '<option value="">-- 自动（least-in-flight）--</option>';
  if (statusData && statusData.token_pool.tokens) {
    statusData.token_pool.tokens.forEach(t => {
      if (t.healthy && t.namespace && t.namespace !== '(未解析)') {
        sel.innerHTML += `<option value="${t.index}">${esc(t.label||'未命名')} · ${esc(t.namespace)}</option>`;
      }
    });
  }
}

function showBucketModal() {
  populateTokenSelect();
  $('bucket-modal').classList.add('show');
  setTimeout(() => $('bucket-name').focus(), 100);
}

function hideBucketModal() {
  $('bucket-modal').classList.remove('show');
  $('bucket-name').value = '';
  $('bucket-private').checked = false;
  $('bucket-modal-error').style.display = 'none';
}

async function createBucket(e) {
  e.preventDefault();
  const err = $('bucket-modal-error'); err.style.display = 'none';
  const btn = $('bucket-submit-btn');
  btn.disabled = true; btn.textContent = '创建中...';

  const tokenIndex = $('bucket-token').value || null;
  const isPrivate = $('bucket-private').checked;
  const name = $('bucket-name').value.trim();

  if (!name) { err.textContent = '请输入桶名'; err.style.display = ''; btn.disabled = false; btn.textContent = '确认创建'; return; }

  try {
    await api('/api/buckets/create', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, private: isPrivate, token_index: tokenIndex ? parseInt(tokenIndex) : null })
    });
    hideBucketModal();
    await refreshData();
    navigate('buckets');
  } catch (ex) {
    err.textContent = ex.message; err.style.display = '';
  }
  btn.disabled = false; btn.textContent = '确认创建';
}

async function ensureBuckets() {
  if (!confirm('将为每个没有桶的 Token 创建一个随机桶，确认？')) return;
  try {
    const r = await api('/api/buckets/ensure', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ private: false })
    });
    const lines = r.details.map(d => {
      const icon = d.status === 'created' ? '✅' : d.status === 'skipped' ? '⏭️' : '❌';
      return `${icon} ${d.namespace} (${d.label||'-'}): ${d.status === 'created' ? '创建 ' + d.bucket : d.status === 'skipped' ? '已有 ' + d.existing_buckets + ' 个桶' : d.reason}`;
    });
    alert(`一键确保完成：创建 ${r.created} 个，跳过 ${r.skipped} 个\n\n${lines.join('\n')}`);
    await refreshData();
    navigate('buckets');
  } catch (ex) {
    alert('操作失败: ' + ex.message);
  }
}

// ═══ Clock ═══
(function tick(){ $('clock').textContent = new Date().toLocaleString('zh-CN',{hour12:false}); setTimeout(tick,1000); })();

// ═══ Init ═══
refreshData();
</script>
</body>
</html>
