<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HugBucket</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#f0f4ff',100:'#dbe4ff',200:'#bac8ff',300:'#91a7ff',400:'#748ffc',500:'#5c7cfa',600:'#4c6ef5',700:'#4263eb',800:'#3b5bdb',900:'#364fc7' },
        surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' },
      },
      fontFamily: { sans: ['"Inter"','system-ui','sans-serif'] },
      borderRadius: { '2xl':'1rem','3xl':'1.25rem','4xl':'1.75rem' },
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; }
  .card { @apply bg-white rounded-3xl border border-slate-200/60 shadow-lg shadow-slate-200/50; }
  .card-hover { @apply transition-all duration-300 hover:shadow-xl hover:shadow-brand-100/40 hover:border-brand-200/60 hover:-translate-y-0.5; }
  .btn { @apply px-5 py-2.5 rounded-2xl font-medium text-sm transition-all duration-200 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed; }
  .btn-primary { @apply bg-brand-500 hover:bg-brand-600 text-white shadow-lg shadow-brand-200/50 hover:shadow-brand-300/60; }
  .btn-danger { @apply bg-rose-50 hover:bg-rose-100 text-rose-500 border border-rose-200; }
  .btn-ghost { @apply bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 shadow-sm; }
  .input { @apply w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 text-sm placeholder-slate-400 focus:outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-50 focus:bg-white transition-all; }
  .badge { @apply px-2.5 py-1 rounded-xl text-xs font-medium; }
  .badge-green { @apply bg-emerald-50 text-emerald-600 border border-emerald-200; }
  .badge-red { @apply bg-rose-50 text-rose-500 border border-rose-200; }
  .badge-amber { @apply bg-amber-50 text-amber-600 border border-amber-200; }
  .progress-bar { @apply h-2.5 rounded-full bg-slate-100 overflow-hidden; }
  .progress-fill { @apply h-full rounded-full transition-all duration-700 ease-out; }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in { animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  .nav-item { @apply flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium transition-all duration-200; }
  .nav-active { @apply bg-brand-50 text-brand-700 shadow-sm; }
  .nav-inactive { @apply text-slate-500 hover:text-slate-700 hover:bg-slate-100; }
  .token-row:hover .token-actions { opacity: 1; }
  .token-actions { opacity: 0; transition: opacity 0.2s; }
</style>
</head>
<body class="text-slate-600 antialiased min-h-screen">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-slate-200/60 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-xl shadow-slate-200/30">
  <div class="p-5 border-b border-slate-100">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-brand-200/50">H</div>
      <div>
        <h1 class="font-semibold text-surface-800 text-sm">HugBucket</h1>
        <p class="text-xs text-slate-400">管理控制台</p>
      </div>
    </div>
  </div>

  <nav class="flex-1 p-4 space-y-1.5">
    <a href="#" data-page="overview" class="nav-item nav-active">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      总览
    </a>
    <a href="#" data-page="buckets" class="nav-item nav-inactive">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      存储桶
    </a>
    <a href="#" data-page="tokens" class="nav-item nav-inactive">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      Token 管理
    </a>
  </nav>

  <div class="p-4 border-t border-slate-100">
    <div class="text-xs text-slate-400 flex items-center gap-2" id="footer-status">
      <span class="w-2 h-2 rounded-full bg-slate-300"></span>
      加载中...
    </div>
  </div>
</aside>

<!-- Main -->
<main class="lg:ml-64 min-h-screen pb-12">
  <!-- Top bar -->
  <header class="sticky top-0 z-30 bg-white/70 backdrop-blur-xl border-b border-slate-200/40">
    <div class="flex items-center justify-between px-5 lg:px-8 h-16">
      <button class="lg:hidden btn btn-ghost p-2.5 !rounded-2xl" onclick="toggleSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="flex items-center gap-3 ml-auto">
        <span class="text-xs text-slate-400 hidden sm:inline" id="clock"></span>
        <button onclick="refreshData()" class="btn btn-ghost text-xs flex items-center gap-1.5 !rounded-2xl">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          刷新
        </button>
      </div>
    </div>
  </header>

  <!-- Page: 总览 -->
  <div id="page-overview" class="p-5 lg:p-8 fade-in">
    <!-- Stats -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
      <div class="card card-hover p-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">存储桶</span>
          <div class="w-10 h-10 rounded-2xl bg-brand-50 flex items-center justify-center">
            <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          </div>
        </div>
        <p class="text-4xl font-bold text-surface-800" id="stat-buckets">-</p>
      </div>

      <div class="card card-hover p-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">总存储量</span>
          <div class="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center">
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16"/></svg>
          </div>
        </div>
        <p class="text-4xl font-bold text-surface-800" id="stat-size">-</p>
      </div>

      <div class="card card-hover p-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">文件总数</span>
          <div class="w-10 h-10 rounded-2xl bg-amber-50 flex items-center justify-center">
            <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          </div>
        </div>
        <p class="text-4xl font-bold text-surface-800" id="stat-files">-</p>
      </div>

      <div class="card card-hover p-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">健康 Token</span>
          <div class="w-10 h-10 rounded-2xl bg-sky-50 flex items-center justify-center">
            <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          </div>
        </div>
        <p class="text-4xl font-bold text-surface-800" id="stat-healthy">-</p>
      </div>
    </div>

    <!-- Bucket preview -->
    <div class="card p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-semibold text-surface-800 text-lg">存储桶用量</h2>
        <a href="#" data-page="buckets" class="nav-item text-sm text-brand-500 hover:text-brand-600 transition-colors !py-1.5 !px-3">查看全部 →</a>
      </div>
      <div id="overview-buckets" class="space-y-2">
        <p class="text-sm text-slate-400 text-center py-10">加载中…</p>
      </div>
    </div>
  </div>

  <!-- Page: 存储桶 -->
  <div id="page-buckets" class="p-5 lg:p-8 hidden">
    <h2 class="text-xl font-bold text-surface-800 mb-6">存储桶</h2>
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">名称</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden sm:table-cell">命名空间</th>
              <th class="text-right px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">用量</th>
              <th class="text-right px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">文件数</th>
              <th class="text-right px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden md:table-cell">可见性</th>
            </tr>
          </thead>
          <tbody id="buckets-table" class="divide-y divide-slate-50">
            <tr><td colspan="5" class="text-center py-12 text-slate-400">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Page: Token 管理 -->
  <div id="page-tokens" class="p-5 lg:p-8 hidden">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-xl font-bold text-surface-800">Token 管理</h2>
        <p class="text-sm text-slate-400 mt-1">配置多个 HF Token 实现负载均衡</p>
      </div>
      <button onclick="showAddTokenModal()" class="btn btn-primary flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        添加 Token
      </button>
    </div>

    <div class="card p-5 mb-5 flex items-center gap-4 text-sm">
      <div class="w-10 h-10 rounded-2xl bg-brand-50 flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <span class="text-slate-500">负载均衡策略：</span>
        <span class="text-surface-800 font-semibold" id="strategy-label">Round Robin</span>
        <span class="text-slate-400 ml-2">— 请求依次轮流分发到健康 Token</span>
      </div>
    </div>

    <div id="tokens-list" class="space-y-3">
      <p class="text-sm text-slate-400 text-center py-12">加载中…</p>
    </div>
  </div>
</main>

<!-- Add Token Modal -->
<div id="add-token-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/30 backdrop-blur-sm p-4" onclick="event.target===this && hideAddTokenModal()">
  <div class="card p-6 w-full max-w-md slide-in" onclick="event.stopPropagation()" style="animation:slideIn 0.3s ease-out">
    <h3 class="text-lg font-semibold text-surface-800 mb-5">添加 HF Token</h3>
    <form onsubmit="addToken(event)" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1.5">HF Token <span class="text-rose-400">*</span></label>
        <input type="password" id="new-token" class="input" placeholder="hf_xxxxxxxxxxxxxxxxxxxxx" required autocomplete="off">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1.5">标签（选填）</label>
        <input type="text" id="new-label" class="input" placeholder="例如：production、personal">
      </div>
      <div class="flex items-center gap-3 pt-2">
        <button type="submit" class="btn btn-primary flex-1">添加</button>
        <button type="button" onclick="hideAddTokenModal()" class="btn btn-ghost flex-1">取消</button>
      </div>
    </form>
    <div id="add-token-error" class="mt-4 text-sm text-rose-500 hidden"></div>
  </div>
</div>

<script>
// State
let currentPage = 'overview';

// Utils
function $(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024, sizes = ['B','KiB','MiB','GiB','TiB'];
  const i = Math.floor(Math.log(bytes)/Math.log(k));
  return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i];
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toString();
}

function timeAgo(ts) {
  if (!ts) return '从未';
  const sec = Math.floor(Date.now()/1000 - ts);
  if (sec < 60) return '刚刚';
  if (sec < 3600) return Math.floor(sec/60)+' 分钟前';
  if (sec < 86400) return Math.floor(sec/3600)+' 小时前';
  return Math.floor(sec/86400)+' 天前';
}

// Navigation
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('[data-page]').forEach(el => {
    el.classList.remove('nav-active','nav-inactive');
    el.classList.add(el.dataset.page === page ? 'nav-active' : 'nav-inactive');
  });
  ['overview','buckets','tokens'].forEach(p => { const el = $('page-'+p); if(el) el.classList.toggle('hidden', p !== page); });
  if (page !== 'overview' || bucketsData === null) refreshData();
  if (page === 'overview' && bucketsData) renderOverview();
}

document.querySelectorAll('[data-page]').forEach(el => {
  el.addEventListener('click', e => { e.preventDefault(); navigate(el.dataset.page); });
});

function toggleSidebar() {
  $('sidebar').classList.toggle('-translate-x-full');
  $('sidebar-overlay').classList.toggle('hidden');
}

// Data
let bucketsData = null, statusData = null;

async function api(path, opts={}) {
  const res = await fetch(path, opts);
  if (!res.ok) { const body = await res.json().catch(()=>({})); throw new Error(body.error||'HTTP '+res.status); }
  return res.json();
}

async function refreshData() {
  try {
    const [buckets, status] = await Promise.all([api('/api/buckets'), api('/api/status')]);
    bucketsData = buckets; statusData = status;
    renderAll(); updateFooter(true);
  } catch(e) { console.error(e); updateFooter(false); }
}

function updateFooter(ok) {
  $('footer-status').innerHTML = ok
    ? '<span class="w-2 h-2 rounded-full bg-emerald-400"></span> 系统正常' + (statusData ? ' · '+statusData.token_pool.total+' Token' : '')
    : '<span class="w-2 h-2 rounded-full bg-rose-400"></span> 连接失败';
}

// Render
function renderAll() { renderOverview(); renderBucketsTable(); renderTokensList(); }

function renderOverview() {
  const d = bucketsData; if (!d) return;
  $('stat-buckets').textContent = d.total;
  $('stat-size').textContent = formatBytes(d.total_size);
  $('stat-files').textContent = formatNum(d.total_files);
  if (statusData) $('stat-healthy').textContent = statusData.token_pool.healthy+'/'+statusData.token_pool.total;

  const buckets = d.buckets.slice(0,5);
  const maxSize = buckets.length ? Math.max(...buckets.map(b=>b.size),1) : 1;
  $('overview-buckets').innerHTML = buckets.length === 0
    ? '<div class="text-center py-10"><div class="w-16 h-16 rounded-3xl bg-slate-100 flex items-center justify-center mx-auto mb-3"><svg class="w-7 h-7 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p class="text-slate-400 text-sm">暂无存储桶 — 请先配置 HF Token</p></div>'
    : buckets.map((b,i) => `
      <div class="flex items-center gap-4 p-3.5 rounded-2xl hover:bg-slate-50 transition-colors">
        <div class="w-9 h-9 rounded-xl bg-slate-100 flex items-center justify-center flex-shrink-0">
          <span class="text-xs font-semibold text-slate-500">${i+1}</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-sm font-medium text-surface-700 truncate">${esc(b.name)}</span>
            <span class="text-xs text-slate-400 ml-2 flex-shrink-0">${formatBytes(b.size)}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill bg-brand-400" style="width:${(b.size/maxSize*100).toFixed(0)}%"></div></div>
        </div>
        <span class="text-xs text-slate-400 flex-shrink-0 hidden sm:inline">${esc(b.namespace)}</span>
      </div>`).join('');
}

function renderBucketsTable() {
  const d = bucketsData; if (!d) return;
  $('buckets-table').innerHTML = d.buckets.length === 0
    ? '<tr><td colspan="5" class="text-center py-16"><div class="w-16 h-16 rounded-3xl bg-slate-100 flex items-center justify-center mx-auto mb-3"><svg class="w-7 h-7 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p class="text-slate-400 text-sm">暂无存储桶</p></td></tr>'
    : d.buckets.map(b => `
      <tr class="hover:bg-slate-50/50 transition-colors">
        <td class="px-6 py-4">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl ${b.private?'bg-amber-50':'bg-emerald-50'} flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 ${b.private?'text-amber-500':'text-emerald-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                ${b.private
                  ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>'
                  : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>'}
              </svg>
            </div>
            <span class="font-medium text-surface-700">${esc(b.name)}</span>
          </div>
        </td>
        <td class="px-6 py-4 text-slate-500 hidden sm:table-cell">${esc(b.namespace)}</td>
        <td class="px-6 py-4 text-right"><span class="text-surface-700 font-medium">${formatBytes(b.size)}</span></td>
        <td class="px-6 py-4 text-right text-slate-500">${formatNum(b.total_files)}</td>
        <td class="px-6 py-4 text-right hidden md:table-cell">
          <span class="badge ${b.private?'badge-amber':'badge-green'}">${b.private?'私有':'公开'}</span>
        </td>
      </tr>`).join('');
}

function renderTokensList() {
  const s = statusData; if (!s) return;
  const tokens = s.token_pool.tokens;
  $('strategy-label').textContent = s.token_pool.strategy === 'round_robin' ? 'Round Robin' : s.token_pool.strategy;
  $('tokens-list').innerHTML = tokens.length === 0
    ? `<div class="card p-10 text-center">
        <div class="w-16 h-16 rounded-3xl bg-slate-100 flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        </div>
        <p class="text-surface-700 font-semibold mb-1">尚未配置 Token</p>
        <p class="text-sm text-slate-400 mb-5">添加 HF Token 以开始管理存储桶</p>
        <button onclick="navigate('tokens'); showAddTokenModal()" class="btn btn-primary">添加第一个 Token</button>
      </div>`
    : tokens.map(t => `
      <div class="card card-hover p-5 token-row">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4 min-w-0">
            <div class="w-11 h-11 rounded-2xl ${t.healthy?'bg-emerald-50':'bg-rose-50'} flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 ${t.healthy?'text-emerald-500':'text-rose-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <span class="font-semibold text-surface-700 text-sm">${esc(t.label||'未命名')}</span>
                <span class="badge ${t.healthy?'badge-green':'badge-red'}">${t.healthy?'健康':'异常'}</span>
              </div>
              <div class="flex items-center gap-2.5 mt-1 text-xs text-slate-400">
                <span class="font-medium text-slate-500">${esc(t.token_preview)}</span>
                <span>·</span>
                <span>${esc(t.namespace)}</span>
                <span>·</span>
                <span>${timeAgo(t.last_checked)}</span>
              </div>
            </div>
          </div>
          <div class="token-actions flex items-center gap-1 flex-shrink-0">
            <button onclick="resolveToken(${t.index})" class="btn btn-ghost text-xs !py-2 !px-3 !rounded-2xl" title="重新解析命名空间">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
            <button onclick="removeToken(${t.index})" class="btn btn-ghost text-xs !py-2 !px-3 !rounded-2xl !text-rose-400 !border-rose-200 hover:!bg-rose-50" title="删除 Token">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
      </div>`).join('');
}

// Token actions
function showAddTokenModal() { $('add-token-modal').classList.remove('hidden'); $('add-token-modal').classList.add('flex'); $('new-token').focus(); }
function hideAddTokenModal() { $('add-token-modal').classList.add('hidden'); $('add-token-modal').classList.remove('flex'); $('add-token-error').classList.add('hidden'); $('new-token').value=''; $('new-label').value=''; }

async function addToken(e) {
  e.preventDefault();
  const errEl = $('add-token-error'); errEl.classList.add('hidden');
  try {
    await api('/api/tokens', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:$('new-token').value.trim(), label:$('new-label').value.trim()})});
    hideAddTokenModal(); await refreshData(); navigate('tokens');
  } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
}

async function removeToken(index) {
  if (!confirm('确认删除 Token？此操作不可撤销。')) return;
  try { await api('/api/tokens/'+index, {method:'DELETE'}); await refreshData(); } catch(e) { alert('删除失败: '+e.message); }
}

async function resolveToken(index) {
  try { const r = await api('/api/tokens/'+index+'/resolve', {method:'POST'}); await refreshData(); } catch(e) { alert('解析失败: '+e.message); }
}

// Clock
function updateClock() { $('clock').textContent = new Date().toLocaleString('zh-CN',{hour12:false}); }
setInterval(updateClock, 1000); updateClock();

// Init
refreshData();
</script>
</body>
</html>
