<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HugBucket · 登录</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #f0f4f8;
    --surface: #fff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-dim: #64748b;
    --text-muted: #94a3b8;
    --brand: #6366f1;
    --brand-hover: #4f46e5;
    --red: #f43f5e;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 16px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.03);
    --shadow-lg: 0 24px 56px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .login-box {
    background: var(--surface); border-radius: 24px; border: 1px solid var(--border);
    box-shadow: var(--shadow-lg); padding: 40px; width: 100%; max-width: 400px;
  }
  .logo {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 20px;
    box-shadow: 0 4px 12px rgba(99,102,241,.30);
    margin: 0 auto 20px;
  }
  h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 650; color: var(--text-dim); margin-bottom: 8px; }
  .input-group {
    display: flex; align-items: center; background: #f8fafc;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    transition: all .2s;
  }
  .input-group:focus-within { background: #fff; border-color: #a5b4fc; box-shadow: 0 0 0 4px rgba(99,102,241,.08); }
  .input-group .prefix { padding: 0 0 0 14px; color: var(--text-muted); display: flex; }
  .input-group .suffix { padding: 0 14px 0 0; display: flex; }
  .input-group input {
    flex: 1; border: none; background: transparent; padding: 13px 14px;
    font-size: 14px; color: var(--text); outline: none; font-family: inherit;
  }
  .input-group input::placeholder { color: var(--text-muted); }
  .suffix-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; color: var(--text-muted); display: flex; }
  .suffix-btn:hover { color: var(--text-dim); background: #e2e8f0; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px; border-radius: var(--radius); font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; transition: all .18s; font-family: inherit;
    background: var(--brand); color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,.25);
  }
  .btn:hover { background: var(--brand-hover); box-shadow: 0 6px 18px rgba(99,102,241,.32); }
  .btn:active { transform: scale(.97); }

  .error {
    display: none; font-size: 13px; color: var(--red); background: #fff1f2;
    padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 20px;
  }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .shake { animation: shake .3s ease-out; }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">H</div>
  <h1>HugBucket</h1>
  <p class="sub">请输入管理密码</p>

  <div class="error" id="error"></div>

  <form onsubmit="login(event)">
    <div class="field">
      <label>密码</label>
      <div class="input-group">
        <span class="prefix">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </span>
        <input type="password" id="password" placeholder="输入密码" required autocomplete="current-password">
        <span class="suffix">
          <button type="button" class="suffix-btn" onclick="toggleVis()" title="显示/隐藏">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9.27-3.11-11-7 1.08-2.44 2.93-4.39 5.22-5.53m2.78-1.03A9.8 9.8 0 0112 5c5 0 9.27 3.11 11 7a11.7 11.7 0 01-4.22 5.19"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 3l18 18M9.88 9.88a3 3 0 104.24 4.24"/></svg>
          </button>
        </span>
      </div>
    </div>
    <button type="submit" class="btn" id="submit-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
      登录
    </button>
  </form>
</div>

<script>
function toggleVis() {
  const i = document.getElementById('password');
  i.type = i.type === 'password' ? 'text' : 'password';
}

async function login(e) {
  e.preventDefault();
  const err = document.getElementById('error');
  const btn = document.getElementById('submit-btn');
  err.style.display = 'none';

  const pwd = document.getElementById('password').value;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (!r.ok) {
      const b = await r.json().catch(() => ({}));
      throw new Error(b.error || '登录失败');
    }
    window.location.href = '/admin';
  } catch (ex) {
    err.textContent = ex.message || '密码错误';
    err.style.display = '';
    err.parentElement.classList.add('shake');
    setTimeout(() => err.parentElement.classList.remove('shake'), 300);
    btn.textContent = '重试';
    setTimeout(() => { btn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> 登录'; }, 1000);
  }
}
</script>
</body>
</html>
